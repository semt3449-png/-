<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Yandex Games SDK -->
    <script src="https://yandex.ru/games/sdk/v2"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATRIX HACK: THE CHOSEN ONE - Идеальная Версия (Yandex Ready)</title>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ СТРАНИЦЫ */
        * {
            -webkit-tap-highlight-color: transparent;
            outline: none;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            user-select: none;
        }

        canvas {
            display: block;
        }

        /* ПЛАВНЫЙ ПЕРЕХОД (FADE OVERLAY) */
        #fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        /* ЭФФЕКТ СТАРОГО ЭЛТ-МОНИТОРА И ВИНЬЕТКА */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: 
                radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 300;
            background-size: 100% 100%, 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* АВТОРСТВО */
        #author {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #005500;
            font-size: 14px;
            z-index: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
            pointer-events: none;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }

        /* УНИВЕРСАЛЬНЫЙ КЛАСС ДЛЯ КНОПОК В ПРАВОМ ВЕРХНЕМ УГЛУ */
        .top-right-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            padding: 6px 12px;
            font-size: 11px;
            color: #00FF00;
            background: rgba(0, 20, 0, 0.4);
            border: 1px solid #00FF00;
            cursor: pointer;
            z-index: 1000;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease-out;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.2);
            backdrop-filter: blur(2px);
            display: none; 
        }

        .top-right-btn:hover, .top-right-btn.touch-active {
            background: #00FF00;
            color: #000;
            box-shadow: 0 0 15px #00FF00;
            transform: scale(1.05);
        }

        .top-right-btn:active {
            transform: scale(0.95);
        }

        /* ГЛАВНОЕ МЕНЮ И МЕНЮ ПАУЗЫ */
        #menu, #pause-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.85); 
            backdrop-filter: blur(3px);
            z-index: 100;
        }

        #pause-menu {
            display: none;
            z-index: 250; 
        }

        /* АНИМАЦИЯ ГЛИТЧА ДЛЯ ЗАГОЛОВКА */
        @keyframes textGlitch {
            0% { text-shadow: 2px 0 #00FF00, -2px 0 rgba(0, 255, 0, 0.5); transform: translate(0); }
            20% { text-shadow: -2px 0 #00FF00, 2px 0 rgba(0, 255, 0, 0.5); transform: translate(-2px, 1px); }
            40% { text-shadow: 2px 0 #00FF00, -2px 0 rgba(0, 255, 0, 0.5); transform: translate(2px, -1px); }
            60% { text-shadow: -2px 0 #00FF00, 2px 0 rgba(0, 255, 0, 0.5); transform: translate(-2px, -1px); }
            80% { text-shadow: 2px 0 #00FF00, -2px 0 rgba(0, 255, 0, 0.5); transform: translate(2px, 1px); }
            100% { text-shadow: 2px 0 #00FF00, -2px 0 rgba(0, 255, 0, 0.5); transform: translate(0); }
        }

        .glitch-text {
            font-size: 36px;
            color: #00FF00;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            margin-bottom: 40px;
            font-weight: bold;
            letter-spacing: 3px;
            text-align: center;
            animation: textGlitch 4s infinite;
        }

        /* КНОПКИ МЕНЮ - УЛУЧШЕННЫЕ ВИЗУАЛЫ */
        .btn {
            border: 2px solid #00FF00;
            color: #00FF00;
            background-color: rgba(0, 20, 0, 0.2);
            padding: 15px 40px;
            cursor: pointer;
            font-size: 18px;
            text-transform: uppercase;
            transition: background-color 0.4s ease, box-shadow 0.4s ease, color 0.4s ease, transform 0.15s ease;
            font-weight: bold;
            font-family: monospace;
            margin-bottom: 15px;
            width: 320px;
            text-align: center;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn:hover, .btn.touch-active {
            background-color: rgba(0, 255, 0, 0.9);
            color: #000;
            box-shadow: 0 0 25px #00FF00, inset 0 0 10px rgba(0,0,0,0.3);
            transform: scale(1.02);
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.8);
        }

        /* АНИМАЦИЯ ПУЛЬСАЦИИ ДЛЯ КНОПКИ ПРЕДЫСТОРИИ */
        @keyframes pulseStory {
            0% { box-shadow: 0 0 5px rgba(0, 170, 0, 0.5); border-color: #00aa00; text-shadow: 0 0 5px rgba(0, 170, 0, 0.5); }
            50% { box-shadow: 0 0 22px rgba(0, 255, 0, 0.9); border-color: #00FF00; text-shadow: 0 0 10px #00FF00; color: #00FF00;}
            100% { box-shadow: 0 0 5px rgba(0, 170, 0, 0.5); border-color: #00aa00; text-shadow: 0 0 5px rgba(0, 170, 0, 0.5); }
        }

        .btn-story {
            border-color: #00aa00;
            color: #00aa00;
            animation: pulseStory 2s infinite; 
        }

        .btn-story:hover, .btn-story.touch-active {
            animation: none; 
            border-color: #00FF00;
        }

        /* КОНТЕЙНЕР ДЛЯ РЕЖИМА И РЕКОРДА */
        .endless-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 320px;
            position: relative;
        }

        .endless-container .btn {
            width: 100%;
            margin-bottom: 0;
        }

        #best-score-display {
            position: absolute;
            left: 340px; 
            white-space: nowrap;
            color: #00FF00;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
            letter-spacing: 1px;
        }

        .menu-spacer {
            height: 15px; 
            width: 100%;
        }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #ui {
            position: absolute;
            top: 50px;
            left: 20px;
            color: #00FF00;
            font-size: 18px;
            display: none;
            pointer-events: none;
            z-index: 50;
        }

        #ui-label {
            margin-bottom: 5px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        #progress-bar {
            width: 300px;
            height: 12px;
            border: 2px solid #00FF00;
            background-color: rgba(0, 20, 0, 0.4);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        #progress-fill {
            height: 100%;
            background-color: #00FF00;
            width: 0%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px #00FF00;
        }

        #score-counter {
            display: none;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00FF00;
        }

        #in-game-best-score {
            display: none;
            font-size: 14px;
            font-weight: normal;
            color: #00aa00;
            text-shadow: 0 0 8px rgba(0, 170, 0, 0.8);
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* ЭКРАН КАТСЦЕН */
        #story-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 200;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        .story-container {
            max-width: 600px;
            width: 90%;
            margin-bottom: 40px;
            min-height: 150px;
            text-align: left;
        }

        .story-text {
            color: #00FF00;
            font-size: 22px;
            line-height: 1.6;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        #story-cursor {
            color: #00FF00;
            font-size: 22px;
            font-weight: bold;
            animation: blink 1s step-end infinite;
            text-shadow: 0 0 8px #00FF00;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        #story-btn {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s, background-color 0.4s ease, box-shadow 0.4s ease, color 0.4s ease, transform 0.15s ease;
        }
        #story-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

<!-- ЭКРАН ПЛАВНОГО ПЕРЕХОДА -->
<div id="fade-overlay"></div>

<div id="author">by: SemRoos</div>

<button id="platform-toggle" class="top-right-btn sound-hover" onclick="playClickSound(); togglePlatform()">МОБИЛЬНЫЙ</button>
<button id="pause-btn" class="top-right-btn sound-hover" onclick="playClickSound(); pauseGame()">ПАУЗА</button>

<div id="menu">
    <div class="glitch-text">MATRIX SYSTEM v1.2</div>
    
    <button class="btn sound-hover touchable-btn" onclick="playClickSound(); fadeTransition(() => startGameModeCampaign(1))">ПОДКЛЮЧИТЬСЯ (СЮЖЕТ)</button>
    
    <div class="endless-container">
        <button class="btn sound-hover touchable-btn" onclick="playClickSound(); fadeTransition(() => startGameModeInfinite())">БЕСКОНЕЧНЫЙ РЕЖИМ</button>
        <div id="best-score-display">РЕКОРД: 0</div>
    </div>
    <div class="menu-spacer"></div>

    <button class="btn btn-story sound-hover touchable-btn" onclick="playClickSound(); fadeTransition(() => openStorySequence(0))">ПРЕДЫСТОРИЯ</button>
</div>

<div id="pause-menu">
    <div class="glitch-text" style="font-size: 48px; color: #fff; text-shadow: 0 0 20px #fff; animation: none;">СИСТЕМА ПРИОСТАНОВЛЕНА</div>
    <button class="btn sound-hover touchable-btn" onclick="playClickSound(); resumeGame()">ПРОДОЛЖИТЬ ВЗЛОМ</button>
    <button class="btn sound-hover touchable-btn" id="pause-platform-btn" onclick="playClickSound(); togglePlatform()">РЕЖИМ: МОБИЛЬНЫЙ</button>
    <button class="btn btn-story sound-hover touchable-btn" onclick="playClickSound(); fadeTransition(() => exitToMainMenu())">ОТКЛЮЧИТЬСЯ (В МЕНЮ)</button>
</div>

<div id="story-screen">
    <div class="story-container">
        <span id="story-content" class="story-text"></span><span id="story-cursor">_</span>
    </div>
    <button id="story-btn" class="btn sound-hover touchable-btn" onclick="playClickSound(); nextStoryPage()"></button>
</div>

<div id="ui">
    <div id="ui-label">ПОЛУЧЕНИЕ ДОСТУПА:</div>
    <div id="progress-bar">
        <div id="progress-fill"></div>
    </div>
    <div id="score-counter">ОЧКИ: 0</div>
    <div id="in-game-best-score">РЕКОРД: 0</div>
</div>

<canvas id="c"></canvas>

<script>
    /**
     * MATRIX HACK: THE CHOSEN ONE - ИДЕАЛЬНАЯ ВЕРСИЯ
     * Полностью оптимизировано под платформу Yandex Games
     * Author: SemRoos
     */

    let ysdk = null;
    let player = null;
    let isYandexReady = false;

    // ИНИЦИАЛИЗАЦИЯ YANDEX GAMES SDK
    YaGames.init().then(_ysdk => {
        ysdk = _ysdk;
        isYandexReady = true;
        
        // Сигнал Яндексу, что загрузка завершена (убирает лоадер Яндекса)
        ysdk.features.LoadingAPI?.ready();
        
        // Инициализация профиля игрока для облачных сохранений рекорда
        initPlayer();

    }).catch(err => {
        console.warn("Yandex SDK не загружен", err);
    });

    function initPlayer() {
        return ysdk.getPlayer({ scopes: false }).then(_player => {
            player = _player;
            return player.getData();
        }).then(data => {
            // Если в облаке есть рекорд, подтягиваем его
            if (data.matrixUltimateBestScore) {
                bestScore = Math.max(bestScore, data.matrixUltimateBestScore);
                updateScoreDisplays();
            }
        }).catch(err => {
            console.warn("Player initialization failed:", err);
        });
    }

    // ВЫЗОВ РЕКЛАМЫ (С полной заморозкой звука)
    function showFullscreenAd(callback) {
        if (ysdk && isYandexReady) {
            // Принудительно глушим звук перед рекламой
            if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
            
            ysdk.adv.showFullscreenAdv({
                callbacks: {
                    onOpen: () => { 
                        if (audioCtx) audioCtx.suspend(); 
                    },
                    onClose: (wasShown) => { 
                        if (audioCtx && !document.hidden) audioCtx.resume(); 
                        if (callback) callback(); 
                    },
                    onError: (error) => { 
                        if (audioCtx && !document.hidden) audioCtx.resume(); 
                        if (callback) callback(); 
                    }
                }
            });
        } else {
            if (callback) callback();
        }
    }

    // --- ОБРАБОТКА КАСАНИЙ ДЛЯ КНОПОК ---
    document.addEventListener("DOMContentLoaded", () => {
        const touchBtns = document.querySelectorAll('.touchable-btn, .top-right-btn');
        touchBtns.forEach(btn => {
            btn.addEventListener('touchstart', () => btn.classList.add('touch-active'), {passive: true});
            btn.addEventListener('touchend', () => btn.classList.remove('touch-active'), {passive: true});
            btn.addEventListener('touchcancel', () => btn.classList.remove('touch-active'), {passive: true});
        });
    });

    // --- ПЛАВНЫЙ ПЕРЕХОД ---
    function fadeTransition(callback) {
        const overlay = document.getElementById('fade-overlay');
        overlay.style.opacity = '1'; 
        
        setTimeout(() => {
            callback(); 
            setTimeout(() => {
                overlay.style.opacity = '0'; 
            }, 100); 
        }, 800); 
    }

    // --- AUDIO ENGINE ---
    let audioCtx = null;
    let ambientOsc = null;
    let ambientGain = null;

    function initAudioEngine() {
        if (!audioCtx) {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            startAmbientHum();
        }
        if (audioCtx.state === 'suspended' && !document.hidden) audioCtx.resume();
    }

    function startAmbientHum() {
        if (!audioCtx) return;
        ambientOsc = audioCtx.createOscillator();
        ambientGain = audioCtx.createGain();
        ambientOsc.type = 'sawtooth';
        ambientOsc.frequency.value = 50; 
        ambientGain.gain.value = 0.015; 
        ambientOsc.connect(ambientGain);
        ambientGain.connect(audioCtx.destination);
        ambientOsc.start();
    }

    function playHoverSound() {
        if (!audioCtx || audioCtx.state !== 'running') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
    }

    function playClickSound() {
        initAudioEngine(); 
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playTypewriterSound() {
        if (!audioCtx || audioCtx.state !== 'running') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(600 + Math.random() * 200, audioCtx.currentTime); 
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime); 
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.03);
    }

    function playHitSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(900, audioCtx.currentTime);
        osc.frequency.setValueAtTime(1800, audioCtx.currentTime + 0.05);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    function playTransitionSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.5); 
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 1.5);
    }

    document.querySelectorAll('.sound-hover').forEach(el => {
        el.addEventListener('mouseenter', playHoverSound);
    });

    // Важно для Яндекса: отключаем звук при сворачивании вкладки
    document.addEventListener('visibilitychange', function() {
        if (document.hidden) {
            if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
            if (isPlaying && !isPaused) pauseGame();
        } else {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }
    });

    // --- VISUAL & GAME ENGINE ---
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { alpha: false });

    let currentPlatform = 'mobile';
    const platforms = {
        mobile: { label: "МОБИЛЬНЫЙ", clickPadding: 24, reactionLvl1: 1500, reactionLvl2: 1200 },
        pc: { label: "ПК", clickPadding: 45, reactionLvl1: 2000, reactionLvl2: 1600 }
    };

    const BASE_FONT_SIZE = 16;
    let config = {
        fontSize: BASE_FONT_SIZE,
        speed: 0.15,
        reactionTime: platforms.mobile.reactionLvl1,
        spawnCooldown: 2000,
        maxTargets: 3,
        targetCount: 20,
        isInfinite: false,
        currentLevel: 1
    };

    let canvasWidth, canvasHeight, columns;
    let drops = []; 
    let score = 0;
    
    // Получаем локальный рекорд
    let bestScore = parseInt(localStorage.getItem('matrixUltimateBestScore')) || 0;
    
    function updateScoreDisplays() {
        document.getElementById('best-score-display').innerText = "РЕКОРД: " + bestScore;
        document.getElementById('in-game-best-score').innerText = "РЕКОРД: " + bestScore;
    }
    updateScoreDisplays();

    let targets = [];
    let particles = [];
    let ripples = []; 
    let menuSquares = [];
    let lastSpawnTime = 0;
    
    let infiniteStartTime = 0;
    let glitchIntensity = 0;
    
    let isPlaying = false;
    let isPaused = false;
    let isStoryScreenActive = false; 
    let typewriterTimeout = null;
    
    let mouseX = -100, mouseY = -100;

    const charsArray = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ:;<>{}!@#$%^&*()_+'.split('');

    const storySequences = {
        0: {
            pages: [
                "Ты — оператор Матрицы на корабле. Но Нео нужна помощь по получению ключа доступа от сейфа агентов. Ты должен найти эти ключи и ввести правильный код. Тогда у тебя всё выйдет.",
                "Ты должен быть точным и быстрым, чтоб у тебя получилось точно найти эти ключи. Я верю в тебя. У тебя всё получится."
            ],
            finalButtonLabel: "В МЕНЮ",
            onComplete: function() { fadeTransition(() => { closeStoryScreen(); openMainMenu(); }); }
        },
        1: {
            pages: [
                "Нео смог получить доступ от сейфа, и человечество уже спасено, но Сион находится в опасности. Ты должен перейти на новый уровень."
            ],
            finalButtonLabel: "ПЕРЕХОД",
            onComplete: function() { fadeTransition(() => { closeStoryScreen(); startGameModeCampaign(2); }); }
        },
        2: {
            pages: [
                "Ты наконец-то завершил эту работу, и ты признан лучшим оператором Сиона. С этого момента у тебя началась жизнь, хорошая жизнь.",
                "И ты понял то, что ты и есть тот самый избранный, как и Нео."
            ],
            finalButtonLabel: "ПЕРЕЗАГРУЗКА",
            onComplete: function() { fadeTransition(() => { exitToMainMenu(); }); }
        }
    };

    let activeStorySequence = null;
    let currentStoryPageIndex = 0;

    function initializeApplication() {
        handleResize();
        createMenuBackgroundSquares();
        window.addEventListener('resize', handleResize);
        
        window.addEventListener('pointermove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        document.body.addEventListener('pointerdown', initAudioEngine, { once: true });
        
        updateTopRightButtons(); 
        window.requestAnimationFrame(mainGameLoop);
    }

    function updateTopRightButtons() {
        const platformBtn = document.getElementById('platform-toggle');
        const pauseBtn = document.getElementById('pause-btn');

        if (isStoryScreenActive) {
            platformBtn.style.display = 'none';
            pauseBtn.style.display = 'none';
        } else if (isPlaying) {
            platformBtn.style.display = 'none'; 
            if (isPaused) {
                pauseBtn.style.display = 'none';
            } else {
                pauseBtn.style.display = (currentPlatform === 'mobile') ? 'block' : 'none';
            }
        } else {
            platformBtn.style.display = 'block';
            pauseBtn.style.display = 'none';
        }
    }

    function togglePlatform() {
        const btnMain = document.getElementById('platform-toggle');
        const btnPause = document.getElementById('pause-platform-btn');
        
        if (currentPlatform === 'mobile') {
            currentPlatform = 'pc';
            btnMain.innerText = platforms.pc.label;
            btnPause.innerText = "РЕЖИМ: " + platforms.pc.label;
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            }
        } else {
            currentPlatform = 'mobile';
            btnMain.innerText = platforms.mobile.label;
            btnPause.innerText = "РЕЖИМ: " + platforms.mobile.label;
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(err => console.log(err));
            }
        }
        applyDifficultySettings();
        updateTopRightButtons();
    }

    function applyDifficultySettings() {
        const pData = platforms[currentPlatform];
        if (config.currentLevel === 1) {
            config.reactionTime = pData.reactionLvl1;
        } else {
            config.reactionTime = pData.reactionLvl2;
        }
    }

    function handleResize() {
        canvasWidth = canvas.width = window.innerWidth;
        canvasHeight = canvas.height = window.innerHeight;
        columns = Math.floor(canvasWidth / config.fontSize);
        
        drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -(canvasHeight / config.fontSize) * 2; 
        }
    }

    function createMenuBackgroundSquares() {
        menuSquares = [];
        for (let i = 0; i < 40; i++) {
            menuSquares.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 3 + 2,
                alpha: Math.random(),
                speed: Math.random() * 0.02 + 0.005,
                vx: (Math.random() - 0.5) * 0.7, 
                vy: (Math.random() - 0.5) * 0.7  
            });
        }
    }

    function openMainMenu() { 
        document.getElementById('menu').style.display = 'flex'; 
        updateTopRightButtons();
    }
    
    function closeMainMenu() { 
        document.getElementById('menu').style.display = 'none'; 
    }

    window.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && isPlaying) {
            if (isPaused) resumeGame();
            else pauseGame();
        }
    });

    function pauseGame() {
        if (!isPlaying) return;
        isPaused = true;
        document.getElementById('pause-menu').style.display = 'flex';
        updateTopRightButtons();
    }

    function resumeGame() {
        isPaused = false;
        document.getElementById('pause-menu').style.display = 'none';
        
        const now = performance.now();
        lastSpawnTime = now; 
        updateTopRightButtons();
    }

    function exitToMainMenu() {
        isPaused = false;
        isPlaying = false;
        saveHighScore();
        document.getElementById('pause-menu').style.display = 'none';
        document.getElementById('ui').style.display = 'none';
        closeStoryScreen(); 
        
        // Показ рекламы при выходе в меню (монетизация сессии)
        showFullscreenAd(() => {
            openMainMenu();
        });
    }

    // Сохранение локально и в облако Яндекса
    function saveHighScore() {
        if (config.isInfinite && score > bestScore) {
            bestScore = score;
            localStorage.setItem('matrixUltimateBestScore', bestScore);
            updateScoreDisplays();
            
            if (player) {
                player.setData({
                    matrixUltimateBestScore: bestScore
                }).then(() => {
                    console.log('Record saved in Yandex Cloud');
                }).catch(() => {
                    console.warn('Failed to save in Yandex Cloud');
                });
            }
        }
    }

    function openStorySequence(sequenceId) {
        isStoryScreenActive = true;
        activeStorySequence = storySequences[sequenceId];
        currentStoryPageIndex = 0;
        
        closeMainMenu();
        document.getElementById('story-screen').style.display = 'flex';
        updateTopRightButtons();
        
        renderCurrentStoryPage();
    }
    
    function closeStoryScreen() { 
        isStoryScreenActive = false;
        document.getElementById('story-screen').style.display = 'none'; 
        clearTimeout(typewriterTimeout);
        updateTopRightButtons();
    }

    function renderCurrentStoryPage() {
        const textElement = document.getElementById('story-content');
        const cursorElement = document.getElementById('story-cursor');
        const buttonElement = document.getElementById('story-btn');
        
        buttonElement.classList.remove('visible');
        cursorElement.style.display = 'inline'; 
        textElement.innerText = ""; 
        clearTimeout(typewriterTimeout);
        
        setTimeout(() => {
            const fullText = activeStorySequence.pages[currentStoryPageIndex];
            let currentText = "";
            let charIndex = 0;
            
            function typeNextChar() {
                if (charIndex < fullText.length) {
                    const char = fullText.charAt(charIndex);
                    currentText += char;
                    textElement.innerText = currentText; 
                    
                    if (char !== ' ') {
                        playTypewriterSound();
                    }

                    charIndex++;
                    typewriterTimeout = setTimeout(typeNextChar, 35); 
                } else {
                    if (currentStoryPageIndex < activeStorySequence.pages.length - 1) {
                        buttonElement.innerText = "ДАЛЕЕ";
                    } else {
                        buttonElement.innerText = activeStorySequence.finalButtonLabel;
                    }
                    buttonElement.classList.add('visible');
                }
            }
            typeNextChar();
        }, 300);
    }

    function nextStoryPage() {
        if (currentStoryPageIndex < activeStorySequence.pages.length - 1) {
            currentStoryPageIndex++;
            renderCurrentStoryPage();
        } else {
            activeStorySequence.onComplete();
        }
    }

    // --- РЕЖИМЫ ---
    function startGameModeCampaign(levelNumber) {
        config.isInfinite = false;
        config.currentLevel = levelNumber;

        if (levelNumber === 1) {
            config.fontSize = BASE_FONT_SIZE;
            config.speed = 0.20; 
            config.targetCount = 20;
            config.maxTargets = 3;
            config.spawnCooldown = 2000;
        } else {
            config.fontSize = 13;               
            config.speed = 0.25;                 
            config.targetCount = 40;             
            config.maxTargets = 5;               
            config.spawnCooldown = 1300;         
        }

        applyDifficultySettings();
        prepareGameSession();
    }

    function startGameModeInfinite() {
        config.isInfinite = true;
        config.currentLevel = 1;
        
        config.fontSize = BASE_FONT_SIZE;
        config.speed = 0.20;
        config.maxTargets = 3;
        config.spawnCooldown = 2000;

        applyDifficultySettings();
        infiniteStartTime = performance.now(); 
        prepareGameSession();
    }

    function prepareGameSession() {
        closeMainMenu();
        closeStoryScreen();
        document.getElementById('pause-menu').style.display = 'none';
        
        const uiContainer = document.getElementById('ui');
        const scoreCounter = document.getElementById('score-counter');
        const inGameBestScore = document.getElementById('in-game-best-score');
        const progressBar = document.getElementById('progress-bar');
        const uiLabel = document.getElementById('ui-label');
        const progressFill = document.getElementById('progress-fill');

        uiContainer.style.display = 'block';

        if (config.isInfinite) {
            scoreCounter.style.display = 'block';
            inGameBestScore.style.display = 'block';
            progressBar.style.display = 'none';
            uiLabel.style.display = 'none';
            scoreCounter.innerText = "ОЧКИ: 0";
            updateScoreDisplays();
        } else {
            scoreCounter.style.display = 'none';
            inGameBestScore.style.display = 'none';
            progressBar.style.display = 'block';
            uiLabel.style.display = 'block';
            progressFill.style.width = '0%';
        }

        score = 0;
        targets = [];
        particles = [];
        ripples = [];
        
        handleResize(); 
        
        isPlaying = true;
        isPaused = false;
        lastSpawnTime = performance.now();
        
        updateTopRightButtons(); 
        playTransitionSound(); 
    }

    // --- ИГРОВОЙ ЦИКЛ ---
    function mainGameLoop(timestamp) {
        if (isPlaying) {
            if (config.isInfinite && !isPaused) {
                const elapsedMillis = timestamp - infiniteStartTime;
                const progress = Math.min(elapsedMillis / 600000, 1.0); 
                
                config.maxTargets = Math.floor(3 + (7 * progress)); 
                config.spawnCooldown = 2000 - (1400 * progress);
                
                const baseReaction = platforms[currentPlatform].reactionLvl1;
                config.reactionTime = baseReaction - (baseReaction * 0.4 * progress); 
                
                glitchIntensity = progress;
            } else {
                glitchIntensity = 0;
            }

            renderGameplay(timestamp);
        } else {
            renderMenuBackground();
        }
        window.requestAnimationFrame(mainGameLoop);
    }

    function renderGameplay(timestamp) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        if (currentPlatform === 'pc' && mouseX > 0 && mouseY > 0 && !isPaused) {
            const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 150);
            gradient.addColorStop(0, 'rgba(0, 255, 0, 0.05)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        }

        if (glitchIntensity > 0 && Math.random() < 0.02 + (0.05 * glitchIntensity)) {
            const sliceY = Math.random() * canvasHeight;
            const sliceH = Math.random() * 40 + 10;
            const shiftX = (Math.random() - 0.5) * 60 * glitchIntensity;
            
            ctx.drawImage(canvas, 0, sliceY, canvasWidth, sliceH, shiftX, sliceY, canvasWidth, sliceH);
            
            ctx.fillStyle = `rgba(255, 0, 0, ${0.15 * glitchIntensity})`;
            ctx.fillRect(0, sliceY, canvasWidth, sliceH);
        }

        ctx.font = config.fontSize + 'px monospace';
        ctx.fillStyle = '#00FF00';

        for (let i = 0; i < drops.length; i++) {
            const char = charsArray[Math.floor(Math.random() * charsArray.length)];
            const xPos = i * config.fontSize;
            const yPos = drops[i] * config.fontSize;

            if (yPos > 0 && yPos < canvasHeight + config.fontSize) {
                ctx.fillText(char, xPos, yPos);
            }

            if (!isPaused) {
                if (yPos > canvasHeight && Math.random() > 0.98) {
                    drops[i] = 0;
                }
                drops[i] += config.speed; 
            }
        }

        if (isPaused) return;

        const timeSinceLastSpawn = timestamp - lastSpawnTime;
        if (targets.length < config.maxTargets && timeSinceLastSpawn > config.spawnCooldown) {
            const randomCol = Math.floor(Math.random() * columns);
            const randomRow = Math.floor(Math.random() * (canvasHeight / config.fontSize - 4)) + 2; 
            
            targets.push({
                x: randomCol * config.fontSize,
                y: randomRow * config.fontSize,
                char: '[]',
                startTime: timestamp
            });
            lastSpawnTime = timestamp;
        }

        for (let i = targets.length - 1; i >= 0; i--) {
            const target = targets[i];
            const timeElapsed = timestamp - target.startTime;
            
            if (timeElapsed > config.reactionTime) {
                targets.splice(i, 1);
                continue;
            }

            const alphaValue = 1 - (timeElapsed / config.reactionTime);
            ctx.globalAlpha = alphaValue;
            ctx.fillStyle = 'rgba(255, 255, 255, ' + alphaValue + ')'; 
            
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#FFFFFF';
            ctx.fillText(target.char, target.x, target.y);
            ctx.shadowBlur = 0;
            
            ctx.globalAlpha = 1.0; 
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; 
            p.alpha -= 0.05; 
            if (p.alpha <= 0) { particles.splice(i, 1); continue; }
            
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = '#00FF00'; 
            ctx.font = '10px monospace'; 
            ctx.fillText(p.char, p.x, p.y); 
            ctx.globalAlpha = 1.0;
        }

        ctx.lineWidth = 2;
        for (let i = ripples.length - 1; i >= 0; i--) {
            const r = ripples[i];
            r.radius += 3;       
            r.alpha -= 0.04;     
            
            if (r.alpha <= 0) {
                ripples.splice(i, 1);
                continue;
            }

            ctx.beginPath();
            ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0, 255, 0, ${r.alpha})`;
            
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00FF00';
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // КОНЕЦ УРОВНЯ (Кампания)
        if (!config.isInfinite && score >= config.targetCount) {
            isPlaying = false;
            updateTopRightButtons(); 
            playTransitionSound(); 
            
            // Вызов рекламы при успешном прохождении
            showFullscreenAd(() => {
                document.getElementById('ui').style.display = 'none';
                fadeTransition(() => openStorySequence(config.currentLevel === 1 ? 1 : 2));
            });
        }
    }

    function renderMenuBackground() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; 
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        ctx.font = config.fontSize + 'px monospace';
        for (let i = 0; i < drops.length; i++) {
            const char = charsArray[Math.floor(Math.random() * charsArray.length)];
            const xPos = i * config.fontSize;
            const yPos = drops[i] * config.fontSize;

            if (yPos > 0 && yPos < canvasHeight + config.fontSize) {
                ctx.fillStyle = 'rgba(0, 255, 0, 0.2)'; 
                ctx.fillText(char, xPos, yPos);
            }

            if (yPos > canvasHeight && Math.random() > 0.98) {
                drops[i] = 0;
            }
            drops[i] += config.speed * 0.4; 
        }

        for (let i = 0; i < menuSquares.length; i++) {
            const sq = menuSquares[i];
            
            sq.x += sq.vx;
            sq.y += sq.vy;
            
            if (sq.x < 0 || sq.x > canvasWidth) sq.vx *= -1;
            if (sq.y < 0 || sq.y > canvasHeight) sq.vy *= -1;

            sq.alpha += sq.speed;
            if (sq.alpha > 1 || sq.alpha < 0) sq.speed = -sq.speed;
            
            ctx.fillStyle = '#00FF00';
            ctx.globalAlpha = Math.max(0, Math.min(1, sq.alpha)) * 0.5;
            ctx.fillRect(sq.x, sq.y, sq.size, sq.size);
            
            for (let j = i + 1; j < menuSquares.length; j++) {
                const sq2 = menuSquares[j];
                const dx = sq.x - sq2.x;
                const dy = sq.y - sq2.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                if (distance < 120) {
                    ctx.beginPath();
                    ctx.moveTo(sq.x, sq.y);
                    ctx.lineTo(sq2.x, sq2.y);
                    ctx.strokeStyle = `rgba(0, 255, 0, ${0.3 * (1 - distance / 120)})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }
        }
        ctx.globalAlpha = 1.0;
    }

    // --- ОБРАБОТКА НАЖАТИЙ ---
    window.addEventListener('pointerdown', function(e) {
        initAudioEngine(); 
        
        if (!isPlaying || isPaused || e.target.closest('#pause-menu') || e.target.closest('.top-right-btn') || e.target.closest('.btn')) {
            return; 
        }
        
        const touchX = e.clientX;
        const touchY = e.clientY;

        ripples.push({ x: touchX, y: touchY, radius: 0, alpha: 0.8 });

        let currentPadding = platforms[currentPlatform].clickPadding;
        if (config.isInfinite) {
            currentPadding = Math.max(5, currentPadding - (currentPadding * 0.75 * glitchIntensity));
        }

        for (let i = targets.length - 1; i >= 0; i--) {
            const target = targets[i];
            
            const targetLeft = target.x - currentPadding;
            const targetRight = target.x + config.fontSize + currentPadding;
            const targetTop = target.y - config.fontSize - currentPadding;
            const targetBottom = target.y + currentPadding;

            if (touchX >= targetLeft && touchX <= targetRight && 
                touchY >= targetTop && touchY <= targetBottom) {
                
                playHitSound(); 
                spawnParticles(target.x, target.y); 
                targets.splice(i, 1);
                
                if (config.isInfinite) {
                    score += 10;
                    document.getElementById('score-counter').innerText = "ОЧКИ: " + score;
                    saveHighScore(); 
                } else {
                    score++;
                    document.getElementById('progress-fill').style.width = ((score / config.targetCount) * 100) + '%';
                }
                break; 
            }
        }
    });

    function spawnParticles(tX, tY) {
        const pCount = 8; 
        const cX = tX + config.fontSize / 2;
        const cY = tY - config.fontSize / 2;
        
        for (let i = 0; i < pCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const spd = Math.random() * 3 + 1.5; 
            particles.push({
                x: cX, y: cY,
                vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
                alpha: 1.0,
                char: Math.random() > 0.5 ? '0' : '1' 
            });
        }
    }

    initializeApplication();

</script>
