<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATRIX HACK: THE CHOSEN ONE</title>
    <style>
        /* БАЗОВЫЕ НАСТРОЙКИ СТРАНИЦЫ */
        * {
            -webkit-tap-highlight-color: transparent;
            outline: none;
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
            user-select: none;
        }

        canvas {
            display: block;
        }

        /* ЭФФЕКТ СТАРОГО ЭЛТ-МОНИТОРА И ВИНЬЕТКА */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: 
                radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,0,0,0.6) 100%),
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 300;
            background-size: 100% 100%, 100% 4px, 3px 100%;
            pointer-events: none;
        }

        /* АВТОРСТВО */
        #author {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            color: #005500;
            font-size: 14px;
            z-index: 400;
            text-transform: uppercase;
            letter-spacing: 4px;
            pointer-events: none;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }

        /* КНОПКА ПЕРЕКЛЮЧЕНИЯ ПЛАТФОРМЫ (ПК / МОБИЛЬНЫЙ) */
        #platform-toggle {
            position: absolute;
            top: 15px;
            right: 20px;
            padding: 6px 12px;
            font-size: 11px;
            color: #00FF00;
            background: rgba(0, 20, 0, 0.4);
            border: 1px solid #00FF00;
            cursor: pointer;
            z-index: 1000;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease-in-out;
            box-shadow: 0 0 8px rgba(0, 255, 0, 0.2);
            backdrop-filter: blur(2px);
        }

        #platform-toggle:hover {
            background: #00FF00;
            color: #000;
            box-shadow: 0 0 15px #00FF00;
            transform: scale(1.05);
        }

        #platform-toggle:active {
            transform: scale(0.95);
        }

        /* ГЛАВНОЕ МЕНЮ */
        #menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000;
            z-index: 100;
        }

        .glitch {
            font-size: 32px;
            color: #00FF00;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.7);
            margin-bottom: 40px;
            font-weight: bold;
            letter-spacing: 2px;
            text-align: center;
        }

        /* КНОПКИ МЕНЮ С АНИМАЦИЕЙ НАЖАТИЯ */
        .btn {
            border: 2px solid #00FF00;
            color: #00FF00;
            background-color: rgba(0, 20, 0, 0.2);
            padding: 15px 40px;
            cursor: pointer;
            font-size: 18px;
            text-transform: uppercase;
            transition: all 0.2s ease-in-out;
            font-weight: bold;
            font-family: monospace;
            margin-bottom: 15px;
            width: 280px;
            text-align: center;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .btn:hover {
            background-color: #00FF00;
            color: #000;
            box-shadow: 0 0 20px #00FF00;
        }

        .btn:active {
            transform: scale(0.92);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
        }

        .btn-story {
            border-color: #00aa00;
            color: #00aa00;
        }

        .btn-story:hover {
            border-color: #00FF00;
            color: #000;
        }

        /* ИГРОВОЙ ИНТЕРФЕЙС */
        #ui {
            position: absolute;
            top: 50px;
            left: 20px;
            color: #00FF00;
            font-size: 18px;
            display: none;
            pointer-events: none;
            z-index: 50;
        }

        #ui-label {
            margin-bottom: 5px;
            font-weight: bold;
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        #progress-bar {
            width: 300px;
            height: 12px;
            border: 2px solid #00FF00;
            background-color: rgba(0, 20, 0, 0.4);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        #progress-fill {
            height: 100%;
            background-color: #00FF00;
            width: 0%;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 10px #00FF00;
        }

        #score-counter {
            display: none;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00FF00;
        }

        /* ЭКРАН КАТСЦЕН */
        #story-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 200;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        /* ПЛАВНОЕ ПОЯВЛЕНИЕ ТЕКСТА КАТСЦЕНЫ */
        .story-text {
            color: #00FF00;
            font-size: 22px;
            line-height: 1.6;
            max-width: 600px;
            text-align: center;
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease-in-out, transform 0.8s ease-in-out;
            margin-bottom: 40px;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        .story-text.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

<!-- Подпись Автора -->
<div id="author">by: SemRoos</div>

<!-- Кнопка переключения платформ (СУПЕР ИДЕАЛЬНАЯ ФИЧА) -->
<button id="platform-toggle" onclick="togglePlatform()">МОБИЛЬНЫЙ</button>

<!-- Главное Меню -->
<div id="menu">
    <div class="glitch">MATRIX SYSTEM v3.1</div>
    <button class="btn" onclick="startGameModeCampaign(1)">ПОДКЛЮЧИТЬСЯ</button>
    <button class="btn" onclick="startGameModeInfinite()">БЕСКОНЕЧНЫЙ РЕЖИМ</button>
    <button class="btn btn-story" onclick="openStorySequence(0)">ПРЕДЫСТОРИЯ</button>
</div>

<!-- Экран текстовой катсцены -->
<div id="story-screen">
    <div id="story-content" class="story-text"></div>
    <button id="story-btn" class="btn" onclick="nextStoryPage()"></button>
</div>

<!-- Игровой UI (Прогресс и Очки) -->
<div id="ui">
    <div id="ui-label">СИНХРОНИЗАЦИЯ ЯДРА:</div>
    <div id="progress-bar">
        <div id="progress-fill"></div>
    </div>
    <div id="score-counter">ОЧКИ: 0</div>
</div>

<!-- Игровой холст -->
<canvas id="c"></canvas>

<script>
    /**
     * MATRIX HACK: THE CHOSEN ONE
     * Author: SemRoos
     * Engine version: 3.1 Super Ideal (PC + Mobile Adaptive)
     */

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { alpha: false });

    // --- СИСТЕМА ПЛАТФОРМ ---
    let currentPlatform = 'mobile'; // 'mobile' или 'pc'

    // Конфигурации для разных платформ (чтобы геймплей был идеален везде)
    const platforms = {
        mobile: {
            label: "МОБИЛЬНЫЙ",
            clickPadding: 24,       // Стандартный хитбокс
            reactionLvl1: 1500,     // 1.5 секунды
            reactionLvl2: 1200      // Ускоренный для 2 уровня
        },
        pc: {
            label: "ПК",
            clickPadding: 45,       // Увеличенный хитбокс для мыши
            reactionLvl1: 2000,     // 2 секунды, как ты просил
            reactionLvl2: 1600      // Пропорциональное ускорение для 2 уровня
        }
    };

    // --- БАЗОВЫЕ КОНСТАНТЫ ИДЕАЛЬНОГО ГЕЙМПЛЕЯ ---
    const BASE_FONT_SIZE = 16;
    const BASE_SPEED = 0.15;
    const BASE_SPAWN_COOLDOWN = 2000;
    const BASE_MAX_TARGETS = 3;
    const BASE_TARGET_COUNT = 20;

    // --- ТЕКУЩИЕ НАСТРОЙКИ СЕССИИ ---
    let config = {
        fontSize: BASE_FONT_SIZE,
        speed: BASE_SPEED,
        reactionTime: platforms.mobile.reactionLvl1, // Обновляется динамически
        spawnCooldown: BASE_SPAWN_COOLDOWN,
        maxTargets: BASE_MAX_TARGETS,
        targetCount: BASE_TARGET_COUNT,
        isInfinite: false,
        currentLevel: 1
    };

    // --- ИГРОВЫЕ ПЕРЕМЕННЫЕ ---
    let canvasWidth;
    let canvasHeight;
    let columns;
    let drops = [];
    let score = 0;
    let targets = [];
    let particles = [];
    let ripples = []; // Новые эффекты кругов на воде (эхо клика)
    let menuSquares = [];
    let lastSpawnTime = 0;
    let isPlaying = false;
    
    // Координаты мыши для эффекта свечения (только для ПК)
    let mouseX = -100;
    let mouseY = -100;

    // Символы Матрицы
    const charsArray = '0123456789ABCDEFGHJKLMNPQRSTUVWXYZ:;<>[]{}!@#$%^&*()_+'.split('');

    // --- ТЕКСТЫ И ЛОГИКА КАТСЦЕН ---
    const storySequences = {
        0: {
            pages: [
                "Ты — оператор Матрицы на корабле. Но Нео нужна помощь по получению ключа доступа от сейфа агентов. Ты должен найти эти ключи и ввести правильный код. Тогда у тебя всё выйдет.",
                "Ты должен быть точным и быстрым, чтоб у тебя получилось точно найти эти ключи. Я верю в тебя. У тебя всё получится."
            ],
            finalButtonLabel: "В МЕНЮ",
            onComplete: function() { closeStoryScreen(); openMainMenu(); }
        },
        1: {
            pages: [
                "Нео смог получить доступ от сейфа, и человечество уже спасено, но Сион находится в опасности. Ты должен перейти на новый уровень."
            ],
            finalButtonLabel: "ПЕРЕХОД",
            onComplete: function() { closeStoryScreen(); startGameModeCampaign(2); }
        },
        2: {
            pages: [
                "Ты наконец-то завершил эту работу, и ты признан лучшим оператором Сиона. С этого момента у тебя началась жизнь, хорошая жизнь.",
                "И ты понял то, что ты и есть тот самый избранный, как и Нео."
            ],
            finalButtonLabel: "ПЕРЕЗАГРУЗКА",
            onComplete: function() { window.location.reload(); }
        }
    };

    let activeStorySequence = null;
    let currentStoryPageIndex = 0;

    // --- ИНИЦИАЛИЗАЦИЯ ИГРЫ ---
    function initializeApplication() {
        handleResize();
        createMenuBackgroundSquares();
        window.addEventListener('resize', handleResize);
        
        // Отслеживание курсора для эффектов
        window.addEventListener('pointermove', function(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.requestAnimationFrame(mainGameLoop);
    }

    // --- ПЕРЕКЛЮЧЕНИЕ ПЛАТФОРМ (ПК / МОБИЛЬНЫЙ) ---
    function togglePlatform() {
        const btn = document.getElementById('platform-toggle');
        
        if (currentPlatform === 'mobile') {
            // ПЕРЕХОД В ПК РЕЖИМ
            currentPlatform = 'pc';
            btn.innerText = platforms.pc.label;
            
            // Включаем полноэкранный режим (Окно во весь монитор)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            }
        } else {
            // ПЕРЕХОД В МОБИЛЬНЫЙ РЕЖИМ
            currentPlatform = 'mobile';
            btn.innerText = platforms.mobile.label;
            
            // Выходим из полного экрана
            if (document.exitFullscreen) {
                document.exitFullscreen().catch(err => console.log(err));
            }
        }

        // Динамически обновляем сложность, если игра уже идет
        applyDifficultySettings();
    }

    function applyDifficultySettings() {
        const pData = platforms[currentPlatform];
        
        if (config.currentLevel === 1) {
            config.reactionTime = pData.reactionLvl1;
        } else {
            config.reactionTime = pData.reactionLvl2;
        }
    }

    function handleResize() {
        canvasWidth = canvas.width = window.innerWidth;
        canvasHeight = canvas.height = window.innerHeight;
        
        columns = Math.floor(canvasWidth / config.fontSize);
        
        drops = [];
        for (let i = 0; i < columns; i++) {
            drops[i] = Math.random() * -30;
        }
    }

    function createMenuBackgroundSquares() {
        menuSquares = [];
        for (let i = 0; i < 50; i++) {
            menuSquares.push({
                x: Math.random() * window.innerWidth,
                y: Math.random() * window.innerHeight,
                size: Math.random() * 4 + 2,
                alpha: Math.random(),
                speed: Math.random() * 0.02 + 0.005
            });
        }
    }

    // --- УПРАВЛЕНИЕ РЕЖИМАМИ ИГРЫ ---
    function startGameModeCampaign(levelNumber) {
        config.isInfinite = false;
        config.currentLevel = levelNumber;

        if (levelNumber === 1) {
            config.fontSize = BASE_FONT_SIZE;
            config.speed = BASE_SPEED;
            config.targetCount = BASE_TARGET_COUNT;
            config.maxTargets = BASE_MAX_TARGETS;
            config.spawnCooldown = BASE_SPAWN_COOLDOWN;
        } else {
            config.fontSize = 13;               
            config.speed = 0.24;                 
            config.targetCount = 40;             
            config.maxTargets = 5;               
            config.spawnCooldown = 1300;         
        }

        applyDifficultySettings(); // Применяем тайминги в зависимости от платформы
        prepareGameSession();
    }

    function startGameModeInfinite() {
        config.isInfinite = true;
        config.currentLevel = 1;
        
        config.fontSize = BASE_FONT_SIZE;
        config.speed = BASE_SPEED;
        config.maxTargets = BASE_MAX_TARGETS;
        config.spawnCooldown = BASE_SPAWN_COOLDOWN;

        applyDifficultySettings();
        prepareGameSession();
    }

    function prepareGameSession() {
        closeMainMenu();
        closeStoryScreen();
        
        const uiContainer = document.getElementById('ui');
        const scoreCounter = document.getElementById('score-counter');
        const progressBar = document.getElementById('progress-bar');
        const uiLabel = document.getElementById('ui-label');
        const progressFill = document.getElementById('progress-fill');

        uiContainer.style.display = 'block';

        if (config.isInfinite) {
            scoreCounter.style.display = 'block';
            progressBar.style.display = 'none';
            uiLabel.style.display = 'none';
            scoreCounter.innerText = "ОЧКИ: 0";
        } else {
            scoreCounter.style.display = 'none';
            progressBar.style.display = 'block';
            uiLabel.style.display = 'block';
            progressFill.style.width = '0%';
        }

        score = 0;
        targets = [];
        particles = [];
        ripples = [];
        lastSpawnTime = 0;
        
        handleResize();
        isPlaying = true;
    }

    // --- УПРАВЛЕНИЕ МЕНЮ И КАТСЦЕНАМИ ---
    function openMainMenu() { document.getElementById('menu').style.display = 'flex'; }
    function closeMainMenu() { document.getElementById('menu').style.display = 'none'; }
    function closeStoryScreen() { document.getElementById('story-screen').style.display = 'none'; }

    function openStorySequence(sequenceId) {
        activeStorySequence = storySequences[sequenceId];
        currentStoryPageIndex = 0;
        
        closeMainMenu();
        document.getElementById('story-screen').style.display = 'flex';
        renderCurrentStoryPage();
    }

    function renderCurrentStoryPage() {
        const textElement = document.getElementById('story-content');
        const buttonElement = document.getElementById('story-btn');
        textElement.classList.remove('visible');
        
        setTimeout(() => {
            textElement.innerText = activeStorySequence.pages[currentStoryPageIndex];
            textElement.classList.add('visible');
            
            if (currentStoryPageIndex < activeStorySequence.pages.length - 1) {
                buttonElement.innerText = "ДАЛЕЕ";
            } else {
                buttonElement.innerText = activeStorySequence.finalButtonLabel;
            }
        }, 500);
    }

    function nextStoryPage() {
        if (currentStoryPageIndex < activeStorySequence.pages.length - 1) {
            currentStoryPageIndex++;
            renderCurrentStoryPage();
        } else {
            activeStorySequence.onComplete();
        }
    }

    // --- ИГРОВОЙ ЦИКЛ (СУПЕР ИДЕАЛЬНАЯ ОТРИСОВКА) ---
    function mainGameLoop(timestamp) {
        if (isPlaying) {
            renderGameplay(timestamp);
        } else {
            renderMenuBackground();
        }
        window.requestAnimationFrame(mainGameLoop);
    }

    function renderGameplay(timestamp) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        // --- НОВЫЙ ЭФФЕКТ: Свечение курсора (только в режиме ПК) ---
        if (currentPlatform === 'pc' && mouseX > 0 && mouseY > 0) {
            const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 150);
            gradient.addColorStop(0, 'rgba(0, 255, 0, 0.05)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        }

        ctx.font = config.fontSize + 'px monospace';
        ctx.fillStyle = '#00FF00';

        // 1. Отрисовка кода (Идеальное ядро)
        for (let i = 0; i < columns; i++) {
            const char = charsArray[Math.floor(Math.random() * charsArray.length)];
            const xPos = i * config.fontSize;
            const yPos = Math.floor(drops[i]) * config.fontSize;

            if (yPos > 0 && yPos < canvasHeight) {
                ctx.fillText(char, xPos, yPos);
            }
            drops[i] += config.speed;
            if (drops[i] * config.fontSize > canvasHeight) drops[i] = 0;
        }

        // 2. Логика спавна
        const timeSinceLastSpawn = timestamp - lastSpawnTime;
        if (targets.length < config.maxTargets && timeSinceLastSpawn > config.spawnCooldown) {
            const randomCol = Math.floor(Math.random() * columns);
            const randomRow = Math.floor(Math.random() * (canvasHeight / config.fontSize - 4)) + 2; 
            
            targets.push({
                x: randomCol * config.fontSize,
                y: randomRow * config.fontSize,
                char: charsArray[Math.floor(Math.random() * charsArray.length)],
                startTime: timestamp
            });
            lastSpawnTime = timestamp;
        }

        // 3. Отрисовка целей
        for (let i = targets.length - 1; i >= 0; i--) {
            const target = targets[i];
            const timeElapsed = timestamp - target.startTime;
            
            if (timeElapsed > config.reactionTime) {
                targets.splice(i, 1);
                continue;
            }

            const alphaValue = 1 - (timeElapsed / config.reactionTime);
            ctx.globalAlpha = alphaValue;
            ctx.fillStyle = 'rgba(160, 185, 160, ' + alphaValue + ')'; 
            ctx.fillText(target.char, target.x, target.y);
            ctx.globalAlpha = 1.0; 
        }

        // 4. Отрисовка частиц взрыва
        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx; p.y += p.vy; p.alpha -= 0.03;
            if (p.alpha <= 0) { particles.splice(i, 1); continue; }
            ctx.globalAlpha = p.alpha;
            ctx.fillStyle = p.color;
            ctx.fillRect(p.x, p.y, p.size, p.size);
            ctx.globalAlpha = 1.0;
        }

        // --- НОВЫЙ ЭФФЕКТ: Отрисовка кругов на воде (Эхо клика) ---
        ctx.lineWidth = 2;
        for (let i = ripples.length - 1; i >= 0; i--) {
            const r = ripples[i];
            r.radius += 3;       // Скорость расширения
            r.alpha -= 0.04;     // Скорость затухания
            
            if (r.alpha <= 0) {
                ripples.splice(i, 1);
                continue;
            }

            ctx.beginPath();
            ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(0, 255, 0, ${r.alpha})`;
            ctx.stroke();
        }

        // 5. Проверка победы
        if (!config.isInfinite && score >= config.targetCount) {
            isPlaying = false;
            setTimeout(() => {
                document.getElementById('ui').style.display = 'none';
                openStorySequence(config.currentLevel === 1 ? 1 : 2);
            }, 500);
        }
    }

    function renderMenuBackground() {
        ctx.fillStyle = '#000000';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        for (let i = 0; i < menuSquares.length; i++) {
            const sq = menuSquares[i];
            sq.alpha += sq.speed;
            if (sq.alpha > 1 || sq.alpha < 0) sq.speed = -sq.speed;
            
            ctx.fillStyle = '#00FF00';
            ctx.globalAlpha = Math.max(0, Math.min(1, sq.alpha)) * 0.35;
            ctx.fillRect(sq.x, sq.y, sq.size, sq.size);
        }
        ctx.globalAlpha = 1.0;
    }

    // --- ОБРАБОТКА НАЖАТИЙ (С ДИНАМИЧЕСКИМ ХИТБОКСОМ) ---
    window.addEventListener('pointerdown', function(e) {
        if (!isPlaying) return;
        
        const touchX = e.clientX;
        const touchY = e.clientY;

        // Создаем визуальный отклик (Круги на воде) в месте клика
        ripples.push({ x: touchX, y: touchY, radius: 0, alpha: 0.8 });

        // Динамический хитбокс в зависимости от платформы
        const currentPadding = platforms[currentPlatform].clickPadding;

        for (let i = targets.length - 1; i >= 0; i--) {
            const target = targets[i];
            
            const targetLeft = target.x - currentPadding;
            const targetRight = target.x + config.fontSize + currentPadding;
            const targetTop = target.y - config.fontSize - currentPadding;
            const targetBottom = target.y + currentPadding;

            if (touchX >= targetLeft && touchX <= targetRight && 
                touchY >= targetTop && touchY <= targetBottom) {
                
                spawnParticles(target.x, target.y); 
                targets.splice(i, 1);
                
                if (config.isInfinite) {
                    score += 10;
                    document.getElementById('score-counter').innerText = "ОЧКИ: " + score;
                } else {
                    score++;
                    document.getElementById('progress-fill').style.width = ((score / config.targetCount) * 100) + '%';
                }
                break; // Запрет на случайное двойное срабатывание
            }
        }
    });

    function spawnParticles(tX, tY) {
        const pCount = 12;
        const cX = tX + config.fontSize / 2;
        const cY = tY - config.fontSize / 2;
        
        for (let i = 0; i < pCount; i++) {
            const angle = Math.random() * Math.PI * 2;
            const spd = Math.random() * 2 + 1;
            particles.push({
                x: cX, y: cY,
                vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
                alpha: 1.0,
                color: Math.random() > 0.5 ? '#FFFFFF' : '#00FF00',
                size: Math.random() * 2 + 2
            });
        }
    }

    initializeApplication();

</script>
</body>
</html>
